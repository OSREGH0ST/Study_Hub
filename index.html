<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a;
            margin: 0;
            overflow-x: hidden;
        }

        .split-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
        }

        /* --- RESPONSIVE / MOBILE --- */
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column; /* Se apilan uno arriba del otro */
            }
            .flag-circle {
                width: 80px !important;
                height: 80px !important;
                margin-bottom: 15px !important;
            }
            h2 {
                font-size: 2.5rem !important;
            }
            .pane {
                flex: 1 !important; /* Evita que crezcan demasiado al tocar en móvil */
            }
        }

        .pane {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        /* Efecto de expansión solo en pantallas grandes */
        @media (min-width: 769px) {
            .pane:hover { flex: 1.4; }
        }

        .jp-pane {
            background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.5)), 
                        url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .fr-pane {
            background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.5)), 
                        url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=2073&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .flag-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 25px;
            border: 4px solid white;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s;
        }

        .jp-flag { background-image: url('https://flagcdn.com/w320/jp.png'); }
        .fr-flag { background-image: url('https://flagcdn.com/w320/fr.png'); }

        .btn-enter {
            margin-top: 20px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="center-divider"></div>

    <div class="split-container">
        <a href="japanese.html" class="pane jp-pane">
            <div class="overlay-content">
                <div class="flag-circle jp-flag"></div>
                <h2 class="text-5xl font-black italic tracking-tighter uppercase">Japanese</h2>
                <center>
                <p class="text-blue-200 mt-2 font-bold tracking-widest uppercase text-xs">日本語学習ガイド</p>
                </center>
                <div class="btn-enter">Start Learning</div>
            </div>
        </a>

        <a href="french.html" class="pane fr-pane">
            <div class="overlay-content">
                <div class="flag-circle fr-flag"></div>
                <h2 class="text-5xl font-black italic tracking-tighter uppercase">French</h2>
                <p class="text-blue-200 mt-2 font-bold tracking-widest uppercase text-xs">Guide d'étude français</p>
                <div class="btn-enter">Commencer</div>
            </div>
        </a>
    </div>

</body>
</html>
